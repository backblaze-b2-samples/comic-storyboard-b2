name: Implementation task
description: File a scoped task for maintainer review.
title: "[Task]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose work for maintainer review.
        This form does not make an issue ready for automated implementation.
        A maintainer must review the issue and apply the dedicated `codex-ready`
        readiness label before any scheduled workflow may pick it up.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the bug, feature, or maintenance task.
      placeholder: What needs to change?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List the observable requirements for a complete fix.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: implementation-notes
    attributes:
      label: Implementation notes
      description: Optional constraints, files, or approaches to consider.
    validations:
      required: false
  - type: textarea
    id: tests
    attributes:
      label: Suggested checks
      description: Commands or manual checks that should pass before opening the PR.
      placeholder: |
        cd services/api && uv run pytest -q
        cd apps/web && npm run typecheck
    validations:
      required: false
